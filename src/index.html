<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emede</title>
    <style>
      html,
      body {
        margin: 0;
        background-color: #faf8f5;
        color: #2c2c2c;
      }
    </style>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["\\(", "\\)"],
            ["$", "$"],
          ],
          displayMath: [
            ["\\[", "\\]"],
            ["$$", "$$"],
          ],
        },
        startup: {
          typeset: false,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script src="vendor/mathjax/tex-chtml.js" defer></script>
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <header id="titlebar" class="titlebar">
      <div class="titlebar-drag" data-tauri-drag-region>
        <span id="titlebar-title" class="titlebar-title">emede</span>
      </div>
      <div class="titlebar-controls">
        <button type="button" id="win-minimize" class="titlebar-btn" aria-label="Minimize">&minus;</button>
        <button type="button" id="win-maximize" class="titlebar-btn" aria-label="Maximize">&#9633;</button>
        <button type="button" id="win-close" class="titlebar-btn titlebar-btn-close" aria-label="Close">&times;</button>
      </div>
    </header>

    <button id="toc-toggle" class="reader-control toc-toggle hidden" title="Contents" aria-label="Table of contents">
      &#9776;
    </button>

    <aside id="toc-panel" class="toc-panel hidden" aria-hidden="true">
      <header class="toc-header">
        <h2>Contents</h2>
        <button id="toc-close" class="toc-close" aria-label="Close contents">&times;</button>
      </header>
      <nav id="toc-list" class="toc-body" aria-label="Table of contents"></nav>
    </aside>

    <button id="settings-toggle" class="reader-control settings-toggle" title="Settings (Ctrl+,)" aria-label="Settings">
      &#9881;
    </button>

    <aside id="settings-panel" class="settings-panel hidden" aria-hidden="true">
      <header class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="settings-close" aria-label="Close settings">&times;</button>
      </header>

      <div class="settings-body">
        <label>
          Text color
          <input id="setting-fg" type="color" />
        </label>

        <label>
          Background
          <input id="setting-bg" type="color" />
        </label>

        <div class="presets">
          <span>Color presets</span>
          <div class="preset-buttons">
            <button type="button" data-preset="light">Light</button>
            <button type="button" data-preset="sepia">Sepia</button>
            <button type="button" data-preset="dark">Dark</button>
            <button type="button" data-preset="gruvbox">Gruvbox</button>
          </div>
        </div>

        <label>
          Body font
          <select id="setting-font"></select>
        </label>

        <label>
          Titles font
          <select id="setting-font-title"></select>
        </label>

        <label>
          Code font
          <select id="setting-font-code"></select>
        </label>

        <div class="presets">
          <span>Font presets</span>
          <div class="preset-buttons">
            <button type="button" data-font-preset="default">Default</button>
            <button type="button" data-font-preset="literata">Literata</button>
            <button type="button" data-font-preset="source">Source</button>
            <button type="button" data-font-preset="noto">Noto</button>
            <button type="button" data-font-preset="dejavu">DejaVu</button>
            <button type="button" data-font-preset="technical">Technical</button>
          </div>
        </div>

        <label>
          Font size
          <span class="range-row">
            <input id="setting-size" type="range" min="8" max="32" step="1" />
            <span id="setting-size-label" class="range-value"></span>
          </span>
        </label>

        <label>
          Margins
          <span class="range-row">
            <input id="setting-margin" type="range" min="0" max="25" step="1" />
            <span id="setting-margin-label" class="range-value"></span>
          </span>
        </label>

        <label>
          Window frame
          <select id="setting-window-frame">
            <option value="emede">emede (custom)</option>
            <option value="system">System (native)</option>
          </select>
        </label>

        <label>
          Keybindings
          <select id="setting-keybindings">
            <option value="default">Default (browser)</option>
            <option value="vim">Vim</option>
            <option value="emacs">Emacs</option>
            <option value="common">Common reader</option>
          </select>
        </label>

        <details class="keybindings-help">
          <summary>Shortcuts</summary>
          <div id="keybindings-help" class="keybindings-help-body"></div>
        </details>
      </div>
    </aside>

    <main id="reader">
      <div id="loading-state" class="loading-state hidden" role="status" aria-live="polite" aria-label="Loading document">
        <img src="assets/logo.png" alt="" class="state-logo" width="128" height="128" />
        <article class="dummy-document" aria-hidden="true">
          <div class="dummy-kicker"></div>
          <div class="dummy-title"></div>
          <div class="dummy-line wide"></div>
          <div class="dummy-line"></div>
          <div class="dummy-line medium"></div>
          <div class="dummy-gap"></div>
          <div class="dummy-line wide"></div>
          <div class="dummy-line short"></div>
          <div class="dummy-quote"></div>
          <div class="dummy-line"></div>
          <div class="dummy-line medium"></div>
        </article>
        <p class="loading-label">Preparing document</p>
      </div>
      <article id="content" class="prose"></article>
      <div id="empty-state" class="empty-state hidden">
        <img src="assets/logo.png" alt="" class="state-logo" width="128" height="128" />
        <p class="empty-title">emede</p>
        <p class="empty-hint">Pass a markdown file:</p>
        <code>emede document.md</code>
      </div>
      <div id="missing-state" class="missing-state hidden">
        <img src="assets/logo.png" alt="" class="state-logo" width="128" height="128" />
        <p class="missing-eyebrow">Document not found</p>
        <h1>That file is not on this shelf.</h1>
        <p id="missing-message" class="missing-message"></p>
        <p class="missing-hint">Check the path and try opening it again.</p>
      </div>
      <div id="error-state" class="error-state hidden">
        <img src="assets/logo.png" alt="" class="state-logo" width="128" height="128" />
        <p id="error-message" class="error-message"></p>
      </div>
    </main>
  </body>
</html>
