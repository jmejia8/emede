name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "emede v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Compress binary and upload to release
        run: |
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"
          BINARY="src-tauri/target/release/emede"
          ICON="src-tauri/icons/128x128.png"
          ARCHIVE="emede-v$VERSION-x86_64-linux.tar.gz"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY"
            ls -la src-tauri/target/release/ 2>/dev/null || echo "release dir not found"
            exit 1
          fi
          # Bundle the binary together with the app icon so install.sh can wire
          # up a desktop entry without a second download.
          STAGE="$(mktemp -d)"
          cp "$BINARY" "$STAGE/emede"
          [ -f "$ICON" ] && cp "$ICON" "$STAGE/128x128.png"
          tar -czf "$ARCHIVE" -C "$STAGE" .
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          gh release upload "v$VERSION" "$ARCHIVE" "$ARCHIVE.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
